name: Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: bun install

      - name: Compile Core for Benchmark (Bun)
        run: bun run benchmark/create.ts --prepare-only
        env:
          NODE_ENV: production

      - name: Run Benchmark (Node.js runtime)
        run: node --import tsx benchmark/create.ts --runtime=node --skip-build --no-report
        env:
          NODE_ENV: production

      - name: Run Benchmark (Bun)
        run: bun run benchmark/create.ts --runtime=bun --skip-build --no-report
        env:
          NODE_ENV: production

      - name: Run Benchmark (Deno)
        run: deno run --allow-read --allow-write --allow-env --allow-run --allow-sys --node-modules-dir=auto benchmark/create.ts --runtime=deno --skip-build --no-report
        env:
          NODE_ENV: production

      - name: Generate Report
        run: bun run benchmark/report.ts

      - name: Commit Benchmark Report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add BENCHMARK.md
          git commit -m "docs: update performance benchmarks" || echo "No changes to commit"
          git push
